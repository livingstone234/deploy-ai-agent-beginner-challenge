services: # dockers compose expects
  backend: # custom key name
    # image: python:latest
    build:
      context: ./backend # directory to build the image from
      dockerfile: Dockerfile
    ports:
      - 8080:8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment: # env variables that are not sensitive
      - PORT=8000
      - MY_PROJECT=Hello world
    env_file: # secret env variables 
      - .env
    volumes:
      - ./backend/src:/app
    depends_on:                       
      db_service:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild # rebuild if requirements.txt changesn AI Agent with Doc
          path: backend/requirements.txt
        - action: rebuild # rebuild if Dockerfile changes
          path: backend/Dockerfile
        - action: restart # restarts the "uvicorn..." command
          path: backend/src/
        # - action: sync # only updates folders and files that are found in both the local folder and the container folder 
        #   path: backend/src/
        #   target: /app

 # DATABASE_URL=postgresql+psycopg://username:password@dbhost:dbport/dbname
 # DATABASE_URL=postgresql+psycopg://dbuser:db-password@db_service:5432/mydb
  db_service: # host name
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=db-password
      - POSTGRES_DB=mydb
    # env_file:
    #   - .env.sample-db
    volumes:
      - dc_managed_db_volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

